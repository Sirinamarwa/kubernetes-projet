apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-loans-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-loans
  template:
    metadata:
      labels:
        app: user-loans
    spec:
      serviceAccountName: loans-service-account
      containers:
        - name: user-loans
          image: chaimaaaa/user-loans-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: BOOK_CATALOG_URL
              value: "http://books-service.library-app.svc.cluster.local:3001"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
