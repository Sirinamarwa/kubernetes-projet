apiVersion: apps/v1
kind: Deployment
metadata:
  name: loans-service
  namespace: library-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loans-service
  template:
    metadata:
      labels:
        app: loans-service
    spec:
      containers:
        - name: loans-service
          image: your-dockerhub-user/loans-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: BOOKS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: library-config
                  key: BOOKS_SERVICE_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: library-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: library-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: library-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: loans-service
  namespace: library-app
spec:
  selector:
    app: loans-service
  ports:
    - port: 3002
      targetPort: 3002
